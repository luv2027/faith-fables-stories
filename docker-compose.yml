services:
  postgres:
    image: postgres:17
    container_name: faithfables-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: faithfables
    ports:
      - "5432:5432"
    volumes:
      - faithfables-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d faithfables"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  faithfables-pgdata:
